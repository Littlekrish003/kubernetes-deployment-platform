
apiVersion: apps/v1
kind: Deployment

metadata:
  name: kubernetes-platform-deployment

spec:
  replicas: 3

  selector:
    matchLabels:
      app: kubernetes-platform

  template:
    metadata:
      labels:
        app: kubernetes-platform

    spec:
      containers:
        - name: kubernetes-platform-container
          image: kubernetes-platform:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3          
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
