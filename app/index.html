<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubernetes Deployment Platform</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            padding: 50px;
            background: #1e293b;
            border-radius: 16px;
            width: 85%;
            max-width: 800px;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 15px;
        }

        .subtitle {
            font-size: 20px;
            color: #38bdf8;
            margin-bottom: 30px;
        }

        .status {
            display: inline-block;
            background: #14532d;
            color: #86efac;
            padding: 10px 20px;
            border-radius: 20px;
            margin-bottom: 30px;
        }

        .architecture {
            background: #0f172a;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            line-height: 2;
        }

        footer {
            margin-top: 30px;
            color: #94a3b8;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>☸ Kubernetes Deployment Platform V2</h1>

        <p class="subtitle">
            Automated • Scalable • Self-Healing
        </p>

        <div class="status">
            ● Version 2 Deployed Successfully
        </div>

        <div class="architecture">
            <h3>Cloud Native Architecture</h3>
            <p>AWS EC2 → Docker → Minikube → Kubernetes → Nginx</p>
        </div>

        <footer>
            MCA Final Semester Cloud & DevOps Project | Version 2
        </footer>

    </div>

</body>
</html>
